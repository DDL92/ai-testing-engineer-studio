name: Daily Lead Operator

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  daily-lead-operator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Run AI Studio OS operator
        run: |
          echo "Running AI Studio OS daily operator at 14:00 UTC schedule, manual dispatch, or temporary main push validation."
          npm run operator:daily
          npm run success:weekly
          npm run success:monthly
          npm run dashboard
          npm run pipeline:opportunities
          npm run client:ops
          npm run renewal:tracker
          echo "Scheduled workflow does not call paid AI APIs by default."
          echo "No APIs, scraping, browser automation, CRM integrations, outreach automation, email, LinkedIn automation, payment systems, credentials, external databases, or client systems are used."
          echo "Human approval remains required before any external action."
          echo "Daily command center path: output/operator/daily-command-center.md"
          echo "Weekly success review path: output/operator/weekly-success-review.md"
          echo "Monthly success review path: output/operator/monthly-success-review.md"
          echo "Dashboard path: output/dashboard/dashboard.md"
          echo "Opportunity tracker path: output/pipeline/opportunity-tracker.md"
          echo "Client ops path: output/client-ops/client-operations-center.md"
          echo "Renewal tracker path: output/renewals/renewal-pipeline.md"

      - name: Upload lead artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-lead-operator-artifacts
          path: |
            output/operator/daily-command-center.md
            output/operator/weekly-success-review.md
            output/operator/monthly-success-review.md
            output/dashboard/dashboard.md
            output/dashboard/dashboard.html
            output/pipeline/opportunity-tracker.md
            output/pipeline/top-opportunities.md
            output/pipeline/follow-up-needed.md
            output/client-ops/client-operations-center.md
            output/client-ops/client-readiness.md
            output/renewals/renewal-pipeline.md
            output/renewals/client-health.md
            output/renewals/renewal-risk-report.md
            output/renewals/expansion-opportunities.md
            output/renewals/renewal-actions.md
          if-no-files-found: warn
