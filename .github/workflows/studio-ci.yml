name: Studio CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Dashboard generation
        run: npm run dashboard:generate

      - name: Mobile summary
        run: npm run mobile:summary

      - name: Security audit
        run: npm run security:audit

      - name: Dashboard security check
        run: npm run security:dashboard-check

      - name: Testing reports
        run: npm run testing:report

      - name: Quality gates
        run: npm run testing:gates
